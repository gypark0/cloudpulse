services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudpulse-backend
    environment:
      - AWS_REGION=ap-northeast-2
    restart: unless-stopped

  frontend:
    build:
      context: ./cloudpulse-frontend
      dockerfile: Dockerfile
    container_name: cloudpulse-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped